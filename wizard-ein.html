<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIN Tax ID Intake | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>
    <main class="wizard-card" style="max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px;">
        <form action="portal-setup.html">
            <span class="hero-tag">IRS Handshake</span>
            <h2 style="margin-bottom: 20px;">Tax ID (EIN) Details</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Legal Entity Name</label>
                <input type="text" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);" required>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Reason for Applying</label>
                <select style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                    <option>Started a new business</option>
                    <option>Hired employees</option>
                    <option>Banking purposes</option>
                    <option>S-Corp Election</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Social Security Number (of Responsible Party)</label>
                <input type="password" placeholder="XXX-XX-XXXX" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);" required>
            </div>
            <button type="submit" class="btn-main" style="width:100%">Procure My EIN →</button>
        </form>
    </main>
</body>
</html>
