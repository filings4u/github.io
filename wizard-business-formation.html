<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Formation Intake | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .wizard-card { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--navy); margin-bottom: 6px; }
        .form-group input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>

    <main class="wizard-card">
        <form action="portal-setup.html">
            <div class="form-section active" id="s1">
                <span class="hero-tag">Step 1: Entity Name</span>
                <h2>What is your business name?</h2>
                <div class="form-group"><label>Desired Name</label><input type="text" placeholder="Acme Logistics LLC"></div>
                <div class="form-group">
                    <label>Designator</label>
                    <select><option>LLC</option><option>Inc.</option><option>Corporation</option></select>
                </div>
                <div class="form-group"><label>Business Purpose</label><textarea style="width:100%; border:1px solid var(--border); border-radius:8px; padding:10px;"></textarea></div>
                <button type="button" class="btn-main" style="width:100%" onclick="next(2)">Registered Agent Info →</button>
            </div>

            <div class="form-section" id="s2">
                <span class="hero-tag">Step 2: Statutory Agent</span>
                <h2>Registered Agent Selection</h2>
                <div class="form-group">
                    <label>Do you have your own agent?</label>
                    <select id="ra-choice"><option value="no">No, use filings4u ($125/yr)</option><option value="yes">Yes, I have my own</option></select>
                </div>
                <button type="submit" class="btn-main" style="width:100%">Continue to Checkout →</button>
            </div>
        </form>
    </main>

    <script>function next(n){ document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active'); }</script>
</body>
</html>
