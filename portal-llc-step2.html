<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLC Members | filings4u</title>
    <style>
        :root { --primary-blue: #0a1f44; --white: #ffffff; --bg-light: #f8f9fa; --border-color: #e2e8f0; --text-gray: #4a5568; --success-green: #48bb78; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #fcfcfc; display: flex; }
        .portal-sidebar { width: 260px; height: 100vh; background: var(--bg-light); border-right: 1px solid var(--border-color); padding: 20px; position: fixed; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-locked .sidebar-nav, .sidebar-locked .logout-container { display: none !important; }
        .sidebar-logo { height: 45px; width: auto; }
        .portal-main { margin-left: 260px; width: calc(100% - 260px); padding: 50px 60px; box-sizing: border-box; }
        .content-container { max-width: 900px; margin: 0 auto; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .step-indicator::before { content: ""; position: absolute; top: 15px; left: 0; right: 0; height: 2px; background: var(--border-color); z-index: 1; }
        .step { width: 30px; height: 30px; background: var(--white); border: 2px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2; color: var(--text-gray); }
        .step.completed { background: var(--success-green); border-color: var(--success-green); color: white; }
        .step.active { border-color: var(--primary-blue); background: var(--primary-blue); color: var(--white); }
        .step-label { font-size: 0.75rem; margin-top: 8px; color: var(--text-gray); font-weight: 600; }
        .step-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .intake-card { background: var(--white); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .intake-input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; box-sizing: border-box; margin-bottom: 20px; }
        .btn-next { background-color: var(--primary-blue); color: var(--white); border: none; padding: 16px 32px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>
    <aside class="portal-sidebar sidebar-locked">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
            <div style="margin-top: 15px; font-size: 0.7rem; color: #a0aec0; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">Formation Wizard</div>
        </div>
    </aside>
    <main class="portal-main">
        <div class="content-container">
            <div class="step-indicator">
                <div class="step-wrapper"><div class="step completed">✓</div><div class="step-label">Basic Info</div></div>
                <div class="step-wrapper"><div class="step active">2</div><div class="step-label">Members</div></div>
                <div class="step-wrapper"><div class="step">3</div><div class="step-label">Address</div></div>
                <div class="step-wrapper"><div class="step">4</div><div class="step-label">Review</div></div>
            </div>
            <div class="intake-card">
                <form action="portal-llc-step3.html">
                    <label style="font-weight: 700; color: var(--primary-blue); display: block; margin-bottom: 10px;">Primary Member/Owner</label>
                    <input type="text" class="intake-input" placeholder="Full Legal Name" required>
                    <input type="number" class="intake-input" placeholder="Ownership Percentage (%)" value="100" required>
                    <button type="submit" class="btn-next">Continue to Address →</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
