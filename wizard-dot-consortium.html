<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consortium Enrollment | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>
    <main class="wizard-card" style="max-width: 700px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px;">
        <form action="portal-setup.html">
            <span class="hero-tag">Safety Compliance</span>
            <h2 style="margin-bottom: 20px;">Drug & Alcohol Pool Enrollment</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">USDOT Number</label>
                <input type="text" placeholder="Required for Clearinghouse sync" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);" required>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Total Drivers to Enroll</label>
                <input type="number" min="1" value="1" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
            </div>
            <div style="background: #fdf6e3; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 0.8rem; color: #7b5c00; border-left: 4px solid #ed8936;">
                <strong>NOTICE:</strong> You must also register on the FMCSA Clearinghouse website and designate <strong>filings4u</strong> as your C/TPA.
            </div>
            <button type="submit" class="btn-main" style="width:100%">Complete Enrollment →</button>
        </form>
    </main>
</body>
</html>
