<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | filings4u</title>
    
    <!-- 1. THIS MUST BE THE VERY FIRST SCRIPT TAG -->
    <script src="https://js.stripe.com/v3/"></script>   
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        :root { --border: #e2e8f0; --navy: #0f172a; --ice: #f8fafc; }
        body { font-family: sans-serif; background: var(--ice); margin: 0; padding: 20px; }
        .checkout-wrapper { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #checkout { margin-top: 20px; min-height: 450px; }
        #loading-message { text-align: center; padding: 80px; color: #64748b; }
    </style>
</head>
<body>

    <main class="checkout-wrapper">
        <div style="text-align: center; margin-bottom: 30px;">
            <img src="images/logo.png" style="height: 35px;">
            <h2>Complete Your Filing</h2>
            <p>Secure payment for your corporate infrastructure</p>
        </div>

        <!-- THIS SHOWS WHILE THE HANDSHAKE HAPPENS -->
        <div id="loading-message">
            <div style="font-size: 1.2rem; font-weight: 700; color: var(--navy);">🔒 Connecting to Stripe...</div>
            <p>Please wait while we prepare your secure checkout.</p>
        </div>

        <!-- THIS MUST BE COMPLETELY EMPTY FOR STRIPE TO WORK -->
        <div id="checkout"></div> 
    </main>

    <script>
        // 2. THIS WAIT FOR THE PAGE AND STRIPE TO BE READY
        window.addEventListener('load', async () => {
            console.log("Checking for Stripe library...");
            
            if (typeof Stripe === 'undefined') {
                document.getElementById('loading-message').innerHTML = "Stripe failed to load. Please check your internet or disable ad-blockers.";
                return;
            }

            // YOUR ACTUAL KEY
            const stripe = Stripe('pk_test_51TTy4u1hrjQxq47MgsMyTpdS4Aadnk4H63kILJaWbuUfppSySDt4Ijx9we7zkkCFEaeqzQ7C3k7Ql9HcSA5Urh3n00pEKGxNLE');
            
            const orderData = JSON.parse(sessionStorage.getItem('pendingOrder'));

            if (!orderData || !orderData.customer_email) {
                alert("Order session not found. Returning to wizard.");
                window.location.href = "wizard-trucker-authority.html";
                return;
            }

            try {
                // 3. GET THE PERMISSION SLIP FROM YOUR SUPABASE FUNCTION
                const fetchClientSecret = async () => {
                    const response = await fetch('https://lrbimrlbskjweynxlgas.supabase.co/functions/v1/stripe-webhook', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: orderData.customer_email,
                            company_name: orderData.company_name,
                            amount: parseInt(orderData.price || 599) * 100,
                            service_type: 'trucker' 
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    return data.clientSecret;
                };

                // 4. LOAD THE FORM
                const checkout = await stripe.initEmbeddedCheckout({ fetchClientSecret });
                
                // HIDE LOADING & MOUNT
                document.getElementById('loading-message').style.display = 'none';
                checkout.mount('#checkout');

            } catch (err) {
                console.error("Initialization failed:", err);
                document.getElementById('loading-message').innerHTML = 
                    `<div style="color:red; font-weight:700;">Error: ${err.message}. Please refresh or contact support.</div>`;
            }
        });
    </script>
</body>
</html>
