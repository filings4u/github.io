<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review & Pay | filings4u</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .checkout-wrapper { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        #checkout { margin-top: 20px; min-height: 400px; }
    </style>
</head>
<body style="background: var(--ice);">
    <main class="checkout-wrapper">
        <h2>Complete Your Filing</h2>
        <p>Review the details and complete your secure payment below.</p>
        
        <!-- Stripe form will be injected here -->
        <div id="checkout">
            <p style="text-align:center; padding: 50px;">Loading secure payment form...</p>
        </div>
    </main>

    <script>
        const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY'); // Your Stripe Public Key
        const orderData = JSON.parse(sessionStorage.getItem('pendingOrder'));

        async function initializeCheckout() {
            // 1. Fetch the client secret from your Supabase Edge Function
            const fetchClientSecret = async () => {
                const response = await fetch('https://YOUR_PROJECT_ID.supabase.co/functions/v1/stripe-webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: orderData.customer_email,
                        company_name: orderData.company_name,
                        amount: orderData.price * 100 // Amount in cents
                    })
                });
                const { clientSecret } = await response.json();
                return clientSecret;
            };

            // 2. Initialize and mount the checkout
            const checkout = await stripe.initEmbeddedCheckout({ fetchClientSecret });
            checkout.mount('#checkout');
        }

        if (orderData) {
            initializeCheckout();
        } else {
            window.location.href = 'index.html';
        }

        const response = await fetch('https://supabase.com/dashboard/project/lrbimrlbskjweynxlgas/functions/v1/stripe-webhook', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        email: orderData.customer_email,
        company_name: orderData.company_name,
        amount: 59900 // Ensure amount is an integer (599.00 * 100)
    })
});

const data = await response.json();
const clientSecret = data.clientSecret; // Ensure this matches exactly what the backend returns

    </script>
</body>
</html>
