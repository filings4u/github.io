<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Your Order | filings4u</title>
    <script src="https://stripe.com"></script>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .checkout-wrapper { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #checkout { margin-top: 20px; min-height: 450px; }
        #loading { text-align: center; padding: 60px; color: var(--text-gray); }
    </style>
</head>
<body style="background: var(--ice);">

    <main class="checkout-wrapper">
        <h2>Secure Checkout</h2>
        <p>Complete your payment to activate your corporate portal.</p>

        <!-- Container for the Stripe Form -->
        <div id="loading">🔒 Connecting to secure payment gateway...</div>
        <div id="checkout"></div> 
    </main>

    <script>
        // REPLACE WITH YOUR ACTUAL PUBLISHABLE KEY (pk_test_...)
        const stripe = Stripe('pk_test_51TTy4u1hrjQxq47MgsMyTpdS4Aadnk4H63kILJaWbuUfppSySDt4Ijx9we7zkkCFEaeqzQ7C3k7Ql9HcSA5Urh3n00pEKGxNLE'); 

        // 1. Get data saved from the Wizard
        const orderData = JSON.parse(sessionStorage.getItem('pendingOrder'));

        async function initialize() {
            if (!orderData) {
                alert("Order session expired. Please restart the wizard.");
                window.location.href = "index.html";
                return;
            }

            // 2. Fetch the client secret from your Supabase Function
            const fetchClientSecret = async () => {
                const response = await fetch('https://lrbimrlbskjweynxlgas.supabase.co/functions/v1/stripe-webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: orderData.customer_email,
                        company_name: orderData.company_name,
                        amount: parseInt(orderData.price || 599) * 100 // Convert to cents
                    })
                });

                const { clientSecret, error } = await response.json();
                if (error) throw new Error(error);
                return clientSecret;
            };

            // 3. Initialize and mount the Stripe Embedded form
            try {
                const checkout = await stripe.initEmbeddedCheckout({ fetchClientSecret });
                document.getElementById('loading').style.display = 'none';
                checkout.mount('#checkout');
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerText = "Error loading checkout. Please refresh.";
            }
        }

        initialize();
    </script>
</body>
</html>
