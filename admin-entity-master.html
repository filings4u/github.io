<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Master | filings4u Admin</title>
    <style>
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
            --staff-red: #c15254;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .portal-sidebar {
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-sizing: border-box;
        }

        .sidebar-header { margin-bottom: 30px; }
        .sidebar-logo { height: 45px; width: auto; margin-bottom: 12px; display: block; }

        .admin-badge {
            background: var(--staff-red);
            color: white;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            letter-spacing: 0.05em;
        }

        .sidebar-nav {
            flex-grow: 1;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            color: var(--primary-blue);
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--primary-blue);
            color: var(--white);
        }

        .nav-item span { margin-right: 12px; width: 20px; text-align: center; }

        .logout-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .logout-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* MAIN CONTENT AREA */
        .portal-main {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 50px 60px;
            box-sizing: border-box;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .welcome-text h1 { margin: 0; color: var(--primary-blue); }
        .welcome-text p { margin: 5px 0; color: var(--text-gray); }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .search-input {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 300px;
            outline: none;
        }

        /* ENTITY TABLE CARD */
        .portal-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.75rem; color: var(--text-gray); padding: 15px; border-bottom: 2px solid var(--bg-light); text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 15px; border-bottom: 1px solid var(--bg-light); font-size: 0.9rem; }

        .status-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .status-tag.active { background: #c6f6d5; color: #22543d; }

        .btn-view {
            background: none;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-view:hover { background: var(--primary-blue); color: white; }
    </style>
</head>
<body>

    <!-- PORTAL SIDEBAR -->
    <aside class="portal-sidebar">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
            <span class="admin-badge">Staff Account</span>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item active"><span>📈</span> Overview</a>
            <a href="admin-entity-master.html" class="nav-item"><span>🏢</span> Entity Master</a>
            <a href="admin-compliance-audit.html" class="nav-item"><span>⚖️</span> Audit Queue</a>
            <a href="admin-revenue-reconciliation.html" class="nav-item"><span>💰</span> Revenue</a>
            <a href="admin-system-logs.html" class="nav-item"><span>🖥️</span> Logs</a>
            
            <div class="logout-container">
                <a href="index.html" class="logout-btn">Sign Out</a>
            </div>
        </nav>
    </aside>

    <!-- MAIN PORTAL CONTENT -->
    <main class="portal-main">
        <div class="content-container">
            <header class="portal-header">
                <div class="welcome-text">
                    <h1>Entity Master</h1>
                    <p>Managing <strong>1,204 active entities</strong></p>
                </div>
                <div class="header-actions">
                    <input type="text" class="search-input" placeholder="Search by name, EIN, or DOT...">
                </div>
            </header>

            <div class="portal-card">
                <table>
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>EIN</th>
                            <th>Jurisdiction</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>Roseland Logistics LLC</strong></td>
                            <td>XX-XXX1234</td>
                            <td>Delaware</td>
                            <td><span class="status-tag active">Verified</span></td>
                            <td><button class="btn-view">Manage</button></td>
                        </tr>
                        <tr>
                            <td><strong>Titan Fleet Systems</strong></td>
                            <td>XX-XXX9901</td>
                            <td>Texas</td>
                            <td><span class="status-tag active">Verified</span></td>
                            <td><button class="btn-view">Manage</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
