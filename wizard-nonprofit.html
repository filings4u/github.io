<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonprofit Formation Intake | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .wizard-card { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--navy); margin-bottom: 6px; }
        .form-group input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>

    <main class="wizard-card">
        <form action="portal-setup.html">
            <!-- STEP 1: MISSION -->
            <div class="form-section active" id="s1">
                <span class="hero-tag">Step 1: Mission & Name</span>
                <h2>Organization Details</h2>
                <div class="form-group"><label>Desired Nonprofit Name</label><input type="text" placeholder="e.g. Foundation for Change" required></div>
                <div class="form-group">
                    <label>Exempt Purpose</label>
                    <select><option>Charitable</option><option>Educational</option><option>Religious</option><option>Scientific</option></select>
                </div>
                <div class="form-group"><label>Mission Statement</label><textarea rows="3" placeholder="Describe the public benefit..."></textarea></div>
                <button type="button" class="btn-main" style="width:100%" onclick="next(2)">Board Members →</button>
            </div>

            <!-- STEP 2: BOARD OF DIRECTORS -->
            <div class="form-section" id="s2">
                <span class="hero-tag">Step 2: Governance</span>
                <h2>Initial Board of Directors</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">Most states require at least 3 unrelated directors.</p>
                <div class="form-group"><label>President Name</label><input type="text" required></div>
                <div class="form-group"><label>Secretary Name</label><input type="text" required></div>
                <div class="form-group"><label>Treasurer Name</label><input type="text" required></div>
                <button type="submit" class="btn-main" style="width:100%">Continue to Security →</button>
            </div>
        </form>
    </main>
    <script>function next(n){ document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active'); }</script>
</body>
</html>
