<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLC Formation Intake | filings4u Portal</title>
    <style>
        /* BASE STYLES */
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --success-green: #48bb78;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .portal-sidebar {
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* GUEST MODE: Hides everything except the header/logo */
        .sidebar-locked .sidebar-nav, 
        .sidebar-locked .logout-container,
        .sidebar-locked .sidebar-tool {
            display: none !important;
        }

        .sidebar-header { margin-bottom: 40px; padding-left: 5px; }
        .sidebar-logo { height: 45px; width: auto; }

        /* MAIN CONTENT AREA */
        .portal-main {
            margin-left: 260px; 
            width: calc(100% - 260px);
            padding: 50px 60px; 
            box-sizing: border-box;
        }

        .content-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .portal-header { margin-bottom: 40px; }
        .welcome-text h1 { margin: 0; color: var(--primary-blue); }

        /* PROGRESS BAR */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        .step-indicator::before {
            content: "";
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-color);
            z-index: 1;
        }
        .step {
            width: 30px;
            height: 30px;
            background: var(--white);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
            color: var(--text-gray);
        }
        .step.active { border-color: var(--primary-blue); background: var(--primary-blue); color: var(--white); }
        .step-label { font-size: 0.75rem; margin-top: 8px; color: var(--text-gray); font-weight: 600; }
        .step-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }

        /* INTAKE FORM CARD */
        .intake-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: var(--primary-blue); }
        .intake-input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        .btn-next {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR: Completely hidden links for new clients -->
    <aside class="portal-sidebar sidebar-locked">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
            <div style="margin-top: 15px; font-size: 0.7rem; color: #a0aec0; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">
                Formation Wizard
            </div>
        </div>
        
        <!-- Even though these links exist in code, they are hidden by CSS class "sidebar-locked" -->
        <nav class="sidebar-nav">
            <a href="portal-dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
        </nav>
    </aside>

    <main class="portal-main">
        <div class="content-container">
            <header class="portal-header">
                <div class="welcome-text">
                    <h1>New Entity Formation</h1>
                    <p>Let's get your business registered officially.</p>
                </div>
            </header>

            <!-- STEP INDICATOR -->
            <div class="step-indicator">
                <div class="step-wrapper"><div class="step active">1</div><div class="step-label">Basic Info</div></div>
                <div class="step-wrapper"><div class="step">2</div><div class="step-label">Members</div></div>
                <div class="step-wrapper"><div class="step">3</div><div class="step-label">Address</div></div>
                <div class="step-wrapper"><div class="step">4</div><div class="step-label">Review</div></div>
            </div>

            <div class="intake-card">
                <form action="portal-llc-step2.html">
                    <div class="form-group">
                        <label>Proposed Company Name</label>
                        <input type="text" class="intake-input" placeholder="e.g. Acme Hauling LLC" required>
                    </div>

                    <div class="form-group">
                        <label>State of Formation</label>
                        <select class="intake-input">
                            <option>Delaware</option>
                            <option>Texas</option>
                            <option>Florida</option>
                            <option>Wyoming</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Primary Business Industry</label>
                        <input type="text" class="intake-input" placeholder="e.g. Logistics & Transportation">
                    </div>

                    <button type="submit" class="btn-next">Save & Continue →</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
