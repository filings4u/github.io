<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal | filings4u</title>
    <style>
        :root { --navy: #0a1f44; --orange: #ff6b00; --ice: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--ice); color: var(--navy); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .portal-container { max-width: 450px; width: 90%; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 20px 40px rgba(10,31,68,0.1); text-align: center; }
        .hidden { display: none; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--orange); color: #fff; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #e66000; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        .doc-card { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>


    <!-- LOGIN STATE -->
    <div id="auth-section" class="portal-container">
        <h2 style="margin-bottom: 10px;">Portal Login</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">Access your formation documents and compliance vault.</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Sign In</button>
    </div>

    <!-- DASHBOARD STATE -->
    <div id="dashboard-section" class="portal-container hidden">
        <h2>Dashboard</h2>
        <p style="font-size: 0.9rem;">Authenticated as: <strong id="userDisplay"></strong></p>
        <div class="dashboard-grid">
            <div class="doc-card">
                <h4 style="margin: 0;">Formation Docs</h4>
                <p style="font-size: 0.8rem; margin: 5px 0;">Articles of Organization, EIN</p>
                <button style="background: var(--navy); padding: 8px; font-size: 0.8rem;">View Files</button>
            </div>
        </div>
        <button id="logoutBtn" style="background: transparent; color: var(--navy); border: 1px solid var(--navy); margin-top: 25px;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

        // YOUR FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyA_45sXieC6fdfQstLQ2a21psXeOxhfdwo",
            authDomain: "customer-portal-18728.firebaseapp.com",
            projectId: "customer-portal-18728",
            storageBucket: "customer-portal-18728.firebasestorage.app",
            messagingSenderId: "117765841972",
            appId: "1:117765841972:web:9746c4f3037270a7811661",
            measurementId: "G-Q2L5R7LP6R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const userDisplay = document.getElementById('userDisplay');

        // Monitor Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                userDisplay.textContent = user.email;
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // Login Action
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                alert("Login Failed: " + err.message);
            }
        };

        // Logout Action
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
