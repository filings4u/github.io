<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | filings4u Portal</title>
    <style>
        /* BASE STYLES */
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .portal-sidebar {
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* GUEST MODE: Hides nav items until account is finalized */
        .sidebar-locked .sidebar-nav, 
        .sidebar-locked .logout-container {
            display: none !important;
        }

        .sidebar-header { margin-bottom: 40px; padding-left: 5px; }
        .sidebar-logo { height: 45px; width: auto; }

        /* MAIN CONTENT AREA */
        .portal-main {
            margin-left: 280px; 
            width: calc(100% - 280px);
            padding: 50px 60px; 
            box-sizing: border-box;
        }

        .content-container {
            max-width: 600px; /* Focused width for setup */
            margin: 0 auto;
        }

        /* CARDS & INPUTS */
        .trigger-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #f0fff4;
            color: var(--success-green);
            font-size: 3rem;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        .receipt-details {
            text-align: left;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .receipt-row strong { color: var(--primary-blue); }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--primary-blue); margin-bottom: 8px; }
        
        .login-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .btn-login {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR REMAINS LOCKED UNTIL PASSWORD IS SET -->
    <aside class="portal-sidebar sidebar-locked">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
            <div style="margin-top: 15px; font-size: 0.75rem; color: #a0aec0; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">
                Account Setup
            </div>
        </div>
    </aside>

    <main class="portal-main">
        <div class="content-container">
            
            <div class="trigger-card">
                <div class="success-icon">✓</div>
                <h1 style="color: var(--primary-blue); margin-bottom: 10px;">Payment Successful</h1>
                <p style="color: var(--text-gray);">Your filing for <strong>Roseland Logistics LLC</strong> is now being processed.</p>

                <div class="receipt-details">
                    <div class="receipt-row"><span>Transaction ID</span><strong>TXN-9042881-A</strong></div>
                    <div class="receipt-row"><span>Amount Paid</span><strong style="color: var(--success-green);">$450.00</strong></div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 30px 0;">

                <h2 style="color: var(--primary-blue); margin-top: 0;">Secure Your Account</h2>
                <p style="color: var(--text-gray); font-size: 0.9rem; margin-bottom: 25px;">Set a password to access your documents and track your compliance status.</p>

                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" class="login-input" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="login-input" placeholder="••••••••">
                </div>

                <button class="btn-login" onclick="window.location.href='portal-dashboard.html'">
                    Finalize & Enter Portal →
                </button>
                
                <p style="margin-top: 20px; font-size: 0.8rem; color: #a0aec0;">
                    By finalizing, you agree to our Terms of Service.
                </p>
            </div>

        </div>
    </main>

</body>
</html>
