<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Audit Intake | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>

    <main class="wizard-card" style="max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <form action="portal-setup.html">
            <span class="hero-tag">Underwriting Safety</span>
            <h2>Audit Readiness Assessment</h2>
            
            <div class="form-group" style="margin-top:20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">USDOT Number</label>
                <input type="text" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);" required>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Have you received your official Audit Notice from FMCSA?</label>
                <select style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="no">No, I want to be proactive</option>
                    <option value="yes">Yes, I have an appointment date</option>
                </select>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Primary ELD Provider</label>
                <input type="text" placeholder="e.g. Motive, Samsara, Garmin" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
            </div>

            <div style="background: #fff5f5; padding: 20px; border-radius: 12px; border: 1px solid #feb2b2; margin: 25px 0;">
                <h4 style="color: #c53030; margin-bottom: 10px; font-size: 0.9rem;">URGENT COMPLIANCE CHECK</h4>
                <p style="font-size: 0.8rem; color: #742a2a; line-height: 1.5;">Do you have a written Preventative Maintenance program and individual files for each driver active right now?</p>
                <select style="width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #feb2b2;">
                    <option>Yes, they are ready for review</option>
                    <option>No, I need filings4u to generate these</option>
                </select>
            </div>

            <button type="submit" class="btn-main" style="width:100%">Secure My Audit Vault →</button>
        </form>
    </main>
</body>
</html>
