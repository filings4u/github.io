<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Profile | filings4u Portal</title>
    <style>
        /* BASE STYLES */
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .portal-sidebar {
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header { margin-bottom: 40px; padding-left: 5px; }
        .sidebar-logo { height: 45px; width: auto; }
        .sidebar-nav { display: flex; flex-direction: column; height: 100%; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            color: var(--primary-blue);
        }

        .nav-item:hover, .nav-item.active { background-color: var(--primary-blue); color: var(--white); }
        .nav-item span { margin-right: 12px; }

        .logout-container { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .logout-btn { display: block; text-align: center; text-decoration: none; background-color: var(--primary-blue); color: var(--white); padding: 12px; border-radius: 8px; font-weight: 600; }

        /* MAIN CONTENT AREA */
        .portal-main { margin-left: 280px; width: calc(100% - 280px); padding: 50px 60px; box-sizing: border-box; }
        .content-container { max-width: 900px; margin: 0 auto; }

        .portal-header { margin-bottom: 40px; }
        .welcome-text h1 { margin: 0; color: var(--primary-blue); }

        /* PROFILE COMPONENTS */
        .profile-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .profile-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-section { margin-bottom: 30px; }
        .form-section h3 { margin-bottom: 20px; color: var(--primary-blue); font-size: 1.1rem; border-bottom: 1px solid var(--bg-light); padding-bottom: 10px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-gray); font-size: 0.9rem; }
        .profile-input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        
        .btn-save { background: var(--primary-blue); color: var(--white); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-save:hover { opacity: 0.9; }

        .security-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--bg-light); }
        .security-info p { margin: 0; font-size: 0.9rem; font-weight: 600; color: var(--primary-blue); }
        .security-info small { color: var(--text-gray); }
    </style>
</head>
<body>

    <!-- PORTAL SIDEBAR -->
    <aside class="portal-sidebar">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="portal-dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
            <a href="portal-my-companies.html" class="nav-item"><span>🏢</span> My Companies</a>
            <a href="portal-vault.html" class="nav-item"><span>📂</span> Vault</a>
            <a href="portal-billing.html" class="nav-item"><span>💳</span> Billing</a>
            <a href="portal-profile.html" class="nav-item active"><span>⚙️</span> Account Settings</a>
            
            <div class="logout-container">
                <a href="index.html" class="logout-btn">Sign Out</a>
            </div>
        </nav>
    </aside>

    <!-- MAIN PORTAL CONTENT -->
    <main class="portal-main">
        <div class="content-container">
            <header class="portal-header">
                <div class="welcome-text">
                    <h1>Account Settings</h1>
                    <p>Manage your personal profile and security preferences.</p>
                </div>
            </header>

            <div class="profile-grid">
                <div class="profile-card">
                    <!-- PERSONAL INFO -->
                    <div class="form-section">
                        <h3>Personal Information</h3>
                        <div class="form-row">
                            <div>
                                <label>First Name</label>
                                <input type="text" class="profile-input" value="John">
                            </div>
                            <div>
                                <label>Last Name</label>
                                <input type="text" class="profile-input" value="Roseland">
                            </div>
                        </div>
                        <div class="form-row">
                            <div>
                                <label>Email Address</label>
                                <input type="email" class="profile-input" value="john@roselandlogistics.com">
                            </div>
                            <div>
                                <label>Phone Number</label>
                                <input type="text" class="profile-input" value="(555) 123-4567">
                            </div>
                        </div>
                        <button class="btn-save">Update Profile</button>
                    </div>

                    <!-- SECURITY INFO -->
                    <div class="form-section">
                        <h3>Security & Access</h3>
                        <div class="security-item">
                            <div class="security-info">
                                <p>Password</p>
                                <small>Last changed 3 months ago</small>
                            </div>
                            <button class="btn-save" style="background: none; border: 1px solid var(--border-color); color: var(--primary-blue);">Change Password</button>
                        </div>
                        <div class="security-item">
                            <div class="security-info">
                                <p>Two-Factor Authentication</p>
                                <small style="color: var(--success-green); font-weight: bold;">✓ Enabled</small>
                            </div>
                            <button class="btn-save" style="background: none; border: 1px solid var(--border-color); color: var(--primary-blue);">Manage</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
