<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Agent Intake | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
</head>
<body style="background: var(--ice);">
    <nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);"><img src="images/logo.png" style="height: 30px;"></nav>
    <main class="wizard-card" style="max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px;">
        <form action="portal-setup.html">
            <span class="hero-tag">Privacy Infrastructure</span>
            <h2 style="margin-bottom: 20px;">Agent Representation</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">Business Name to Represent</label>
                <input type="text" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);" required>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--navy); margin-bottom: 5px;">State of Service</label>
                <select style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                    <option>Delaware</option><option>Texas</option><option>Florida</option><option>Wyoming</option>
                </select>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 25px;">
                Our address will be listed on your state filings to protect your home privacy. All legal mail will be scanned to your portal.
            </p>
            <button type="submit" class="btn-main" style="width:100%">Secure My Agent →</button>
        </form>
    </main>
</body>
</html>
