<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Update | filings4u Portal</title>
    <style>
        /* BASE STYLES */
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .portal-sidebar {
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header { margin-bottom: 40px; padding-left: 5px; }
        .sidebar-logo { height: 45px; width: auto; }
        .sidebar-nav { display: flex; flex-direction: column; height: 100%; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            color: var(--primary-blue);
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--primary-blue);
            color: var(--white);
        }

        .nav-item span { margin-right: 12px; }

        .logout-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .logout-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* MAIN CONTENT AREA */
        .portal-main {
            margin-left: 280px; 
            width: calc(100% - 280px);
            padding: 50px 60px; 
            box-sizing: border-box;
        }

        .content-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .welcome-text h1 { margin: 0; color: var(--primary-blue); }

        /* FLEET TRIGGER COMPONENTS */
        .fleet-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .logic-banner {
            background: #fff8f1;
            border-left: 4px solid #f6ad55;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #7b341e;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary-blue); font-size: 0.9rem; }
        
        .fleet-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- PORTAL SIDEBAR -->
    <aside class="portal-sidebar">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="portal-dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
            <a href="portal-my-companies.html" class="nav-item active"><span>🏢</span> My Companies</a>
            <a href="portal-calendar.html" class="nav-item"><span>📅</span> Compliance</a>
            <a href="portal-vault.html" class="nav-item"><span>📂</span> Vault</a>
            <a href="portal-billing.html" class="nav-item"><span>💳</span> Billing</a>
            
            <div class="logout-container">
                <a href="index.html" class="logout-btn">Sign Out</a>
            </div>
        </nav>
    </aside>

    <!-- MAIN PORTAL CONTENT -->
    <main class="portal-main">
        <div class="content-container">
            <header class="portal-header">
                <div class="welcome-text">
                    <h1>Fleet Authority Update</h1>
                    <p>Modify power units and operational scope for <strong>Roseland Logistics LLC</strong></p>
                </div>
            </header>

            <div class="fleet-card">
                <div class="logic-banner">
                    <strong>FMCSA Compliance Note:</strong> Power unit changes may trigger a mandatory UCR price bracket adjustment or a MCS-150 biennial update.
                </div>

                <form>
                    <div class="form-grid">
                        <div>
                            <label>Current Power Units</label>
                            <input type="number" class="fleet-input" value="2">
                        </div>
                        <div>
                            <label>Updated Unit Count</label>
                            <input type="number" class="fleet-input" placeholder="Enter new count...">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label>Operating Class</label>
                            <select class="fleet-input">
                                <option>For-Hire</option>
                                <option>Private Property</option>
                                <option>Private Passenger</option>
                            </select>
                        </div>
                        <div>
                            <label>Mileage (Estimated Annual)</label>
                            <input type="text" class="fleet-input" placeholder="e.g. 150,000">
                        </div>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label>Reason for Modification</label>
                        <textarea class="fleet-input" style="height: 80px; resize: none;" placeholder="Briefly describe the change in operations..."></textarea>
                    </div>

                    <button type="button" class="btn-submit" onclick="alert('Fleet profile updated. Recalculating UCR tiers...')">Submit Fleet Changes</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
