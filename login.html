<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | filings4u Portal</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .auth-card { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--navy); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .tab-btn { background: none; border: none; font-weight: 700; color: #64748b; cursor: pointer; padding: 10px 0; margin-right: 20px; }
        .tab-btn.active { color: var(--navy); border-bottom: 2px solid var(--navy); }
    </style>
</head>
<body style="background: var(--ice);">

    <div class="auth-card">
        <div id="authTabs" style="margin-bottom: 30px;">
            <button class="tab-btn active" id="loginTab">Sign In</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-main" style="width:100%">Access Portal →</button>
        </form>

        <p id="msg" style="margin-top: 20px; font-size: 0.9rem; text-align: center; color: #e53e3e;"></p>
    </div>

    <script>
        // 1. Initialize Supabase
        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU'; // Get this from your Supabase Dashboard Settings > API
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('loginForm');
        const msg = document.getElementById('msg');

        // 2. Handle Login
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            msg.innerText = "Authenticating...";
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });

            if (error) {
                msg.innerText = error.message;
            } else {
                window.location.href = 'portal-dashboard.html';
            }
        };

        // 3. SPECIAL: Check if they arrived from a Password Setup link
        window.onload = () => {
            const hash = window.location.hash;
            if (hash && hash.includes('type=recovery')) {
                // Redirect them to a specific "Set Password" page
                window.location.href = 'update-password.html' + hash;
            }
        };
        
    </script>
</body>
</html>
