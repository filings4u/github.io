<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | filings4u Professional</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .login-container { max-width: 450px; margin: 80px auto; background: white; padding: 50px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(10,31,68,0.08); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--navy); }
        .form-group input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; }
    </style>
</head>
<body style="background: var(--ice);">

<div style="text-align: center; padding: 40px 0 0;">
    <a href="index.html"><img src="images/logo.png" alt="filings4u" style="height: 35px;"></a>
</div>

<main class="login-container">
    <span class="hero-tag">Client Access</span>
    <h2 style="margin-bottom: 30px;">Welcome Back.</h2>
    
    <form action="https://portal.filings4u.com/index.html">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-main" style="width: 100%; margin-top: 10px;">Sign In to Portal →</button>
    </form>

    <div style="margin-top: 30px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px;">
        <p style="font-size: 0.85rem; color: var(--text-muted);">New client? <a href="signup.html" style="color: var(--emerald); font-weight: 700; text-decoration: none;">Create an account</a></p>
    </div>
</main>

</body>
</html>
