<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | filings4u Professional</title>
    <style>
        :root { --border: #e2e8f0; --navy: #0f172a; --ice: #f8fafc; --emerald: #10b981; --text-gray: #64748b; }
        body { font-family: sans-serif; background: var(--ice); margin: 0; }
        .login-container { max-width: 450px; margin: 80px auto; background: white; padding: 50px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(10,31,68,0.08); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--navy); }
        .form-group input { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid var(--border); font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        #errorMessage { color: #e53e3e; font-size: 0.85rem; margin-bottom: 15px; display: none; background: #fff5f5; padding: 10px; border-radius: 6px; border: 1px solid #feb2b2; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <div style="text-align: center; padding: 40px 0 0;">
        <a href="index.html"><img src="images/logo.png" alt="filings4u" style="height: 35px;"></a>
    </div>

    <main class="login-container">
        <div id="errorMessage"></div>
        <h2 style="margin-bottom: 30px;">Welcome Back.</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-main" style="width: 100%; margin-top: 10px;">Sign In to Portal →</button>
        </form>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid var(--border); padding-top: 25px;">
            <p style="font-size: 0.85rem; color: var(--text-gray); margin-bottom: 10px;">
                New client? <a href="onboarding-gate.html" style="color: var(--emerald); font-weight: 800; text-decoration: none;">Create an account</a>
            </p>
            <p style="font-size: 0.85rem;">
                <a href="#" onclick="sendPasswordReset()" style="color: var(--emerald); font-weight: 800; text-decoration: none;">Forgot password?</a>
            </p>
        </div>
    </main>

    <!-- 1. CORRECTED FIREBASE COMPAT SDKS -->

    <script>
        // 2. CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA_45sXieC6fdfQstLQ2a21psXeOxhfdwo",
            authDomain: "customer-portal-18728.firebaseapp.com",
            projectId: "customer-portal-18728",
            storageBucket: "customer-portal-18728.firebasestorage.app",
            messagingSenderId: "117765841972",
            appId: "1:117765841972:web:9746c4f3037270a7811661"
        };

        // 3. INITIALIZE
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // 4. LOGIN LOGIC + REDIRECT ON WRONG EMAIL
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.innerText = "Authenticating...";
            errorDiv.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Success: Check if verified
                    if (!userCredential.user.emailVerified) {
                        window.location.href = "verify.html"; // Redirect to your verify page
                    } else {
                        window.location.href = "https://filings4u.com";
                    }
                })
                .catch((error) => {
                    loginBtn.innerText = "Sign In to Portal →";
                    
                    // If email is wrong/not found, redirect to verify/error page
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-email') {
                        window.location.href = "verify.html?error=notfound";
                    } else {
                        errorDiv.innerText = error.message;
                        errorDiv.style.display = 'block';
                    }
                });
        });

        // 5. GENERATE PASSWORD (RESET EMAIL)
        function sendPasswordReset() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Please enter your email address first.");
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => alert("Password reset email sent! Check your inbox."))
                .catch((error) => alert(error.message));
        }
    </script>
</body>
</html>
